<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Card Pack Simulator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      touch-action: none;
    }

    #room-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #2a1a3e 0%, #0d0d1a 100%);
      z-index: 0;
    }

    #game-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    #money-display {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 18px;
      font-weight: 600;
      color: #ffd700;
      pointer-events: none;
    }

    #scene-title {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
    }

    #transition-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #tooltip {
      position: absolute;
      background: rgba(10,10,20,0.92);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 200px;
      display: none;
      pointer-events: none;
    }

    #tooltip .tooltip-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    #tooltip .tooltip-rarity { font-size: 12px; opacity: 0.7; margin-bottom: 6px; }
    #tooltip .tooltip-value { color: #ffd700; }

    #scene-buttons {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      pointer-events: auto;
    }

    .scene-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .scene-btn:hover { background: rgba(255,255,255,0.16); }
    .scene-btn:active { transform: scale(0.96); }
    .scene-btn.primary {
      background: rgba(138,43,226,0.4);
      border-color: rgba(138,43,226,0.6);
    }
    .scene-btn.primary:hover { background: rgba(138,43,226,0.6); }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #loading-screen h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #e0d0ff;
    }

    #loading-bar-wrap {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #8a2be2, #ff69b4);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    #swipe-hint {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      pointer-events: none;
      display: none;
    }

    #cut-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      pointer-events: none;
      display: none;
    }

    #price-labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .price-label {
      position: absolute;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      color: #ffd700;
      font-weight: 600;
      transform: translate(-50%, -100%);
      white-space: nowrap;
      pointer-events: auto;
      cursor: pointer;
    }

    #card-actions {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 24px;
      pointer-events: auto;
    }

    .action-btn-discard {
      background: rgba(220,50,50,0.3);
      border: 1px solid rgba(220,50,50,0.6);
      border-radius: 50%;
      width: 56px; height: 56px;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #ff6b6b;
      transition: background 0.15s;
    }

    .action-btn-keep {
      background: rgba(50,200,100,0.3);
      border: 1px solid rgba(50,200,100,0.6);
      border-radius: 50%;
      width: 56px; height: 56px;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #6bff9e;
      transition: background 0.15s;
    }
  </style>
</head>
<body>
  <div id="room-bg"></div>

  <canvas id="game-canvas"></canvas>

  <div id="hud">
    <div id="scene-title"></div>
    <div id="money-display">$0.00</div>
    <div id="scene-buttons"></div>
    <div id="tooltip">
      <div class="tooltip-name"></div>
      <div class="tooltip-rarity"></div>
      <div class="tooltip-value"></div>
    </div>
    <div id="swipe-hint">Swipe left to discard &nbsp;·&nbsp; Swipe right to keep</div>
    <div id="cut-hint">Draw a line across the pack to open it</div>
    <div id="price-labels"></div>
    <div id="card-actions">
      <div class="action-btn-discard" id="btn-discard" title="Discard">✕</div>
      <div class="action-btn-keep" id="btn-keep" title="Keep">✓</div>
    </div>
  </div>

  <div id="transition-overlay"></div>

  <div id="loading-screen">
    <h1>Card Pack Sim</h1>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
